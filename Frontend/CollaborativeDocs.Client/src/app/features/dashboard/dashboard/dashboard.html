<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>📄 Collaborative Docs</h2>

        <button
            class="btn btn-primary"
            (click)="openCreateModal()">
            + New Document
        </button>

    </div>

    <div class="row">

        <!-- Documents -->
        <div [class]="showCreateModal() ? 'col-lg-8' : 'col-lg-12'">

            @if (documents().length === 0)
            {
                <div class="card">

                    <div class="card-body text-center py-5">

                        <h3>No Documents Available</h3>

                        <p class="text-muted">
                            Create your first document.
                        </p>

                    </div>

                </div>
            }
            @else
            {
                <div class="row">

                    @for (document of documents(); track document.id)
                    {
                        <div class="col-md-6 mb-3">

                            <div class="card shadow-sm h-100 document-card" (click)="openDocument(document.id)">

                                <div class="card-body">

                                    <h5 class="card-title">
                                        📄 {{ document.title }}
                                    </h5>

                                    

                                </div>

                            </div>

                        </div>
                    }

                </div>
            }

        </div>

        <!-- Create Document Panel -->
        @if(showCreateModal())
        {
            <div class="col-lg-4">

                <app-create-document
                    (close)="closeCreateModal()">
                </app-create-document>

            </div>
        }

    </div>

</div>
